# The deploy pipeline (M4): every push to main builds the static bundle and
# publishes it to GitHub Pages. Vite's relative base ("./") makes the bundle
# path-agnostic, so no per-repo configuration is needed.
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site if the repo doesn't have one yet —
          # without this, the first deploy on a fresh repo fails with
          # "Get Pages site failed: Not Found" (runs 1-7 did exactly that).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
