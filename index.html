<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VANTAGE</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0c10;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #d6e0f5; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; top: 10px; left: 12px;
        font-size: 13px; line-height: 1.5;
        color: #aab8d4; opacity: 0.9; pointer-events: none; user-select: none;
        text-shadow: 0 1px 2px #000;
      }

      /* Control bar — phase/turn + the End Phase button (bottom-centre, above the cards). */
      #bar {
        position: fixed; left: 50%; bottom: 178px; transform: translateX(-50%);
        display: flex; align-items: center; gap: 14px;
        background: rgba(10, 13, 20, 0.82); border: 1px solid #2a3550; border-radius: 10px;
        padding: 7px 12px; user-select: none; backdrop-filter: blur(3px);
      }
      #bar:empty { display: none; } /* headless modes leave it empty */
      #bar .bar-info { font-size: 13px; font-weight: 700; color: #eaf0ff; letter-spacing: 0.4px; }
      #bar .bar-hint { font-size: 11px; color: #8ea0c4; max-width: 380px; }
      #bar .bar-warn { color: #ffb27a; font-weight: 700; }
      #bar .btn {
        font: inherit; font-size: 12px; font-weight: 700; color: #06203a;
        background: #7fb0ff; border: none; border-radius: 7px; padding: 6px 12px; cursor: pointer;
      }
      #bar .btn:hover { background: #a9caff; }
      #bar .btn-alt { background: #e6c84a; }
      #bar .btn-alt:hover { background: #f2dc7e; }

      /* Unit info cards — bottom-centre. */
      #cards {
        position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
        display: flex; gap: 8px; max-width: 96vw; overflow-x: auto; padding: 4px;
        user-select: none;
      }
      .card {
        width: 138px; flex: 0 0 auto; box-sizing: border-box;
        background: rgba(12, 16, 24, 0.9); border: 1px solid #283350; border-left: 4px solid var(--side, #4a90ff);
        border-radius: 8px; padding: 6px 8px; cursor: pointer; transition: opacity 0.1s, border-color 0.1s;
      }
      .card:hover { border-color: #4a90ff; }
      .card.greyed { opacity: 0.42; }
      .card.selected { border-color: #ffe66a; box-shadow: 0 0 0 1px #ffe66a, 0 0 10px rgba(255, 230, 106, 0.35); }
      .card-h { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
      .card-h .abbr {
        font-weight: 800; font-size: 11px; color: #06203a; background: var(--side, #4a90ff);
        border-radius: 4px; width: 16px; height: 16px; line-height: 16px; text-align: center; flex: 0 0 auto;
      }
      .card-h .nm { font-size: 11px; font-weight: 600; color: #eaf0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card-h .nm .sub { font-size: 8.5px; font-weight: 400; color: #8ea0c4; }
      .card-h .tag { margin-left: auto; font-size: 9px; font-weight: 700; color: #8ea0c4; letter-spacing: 0.5px; }
      .meter { display: flex; align-items: center; gap: 5px; margin: 2px 0; }
      .meter .ml { font-size: 8px; color: #7e8eae; width: 30px; flex: 0 0 auto; }
      .meter .mt { flex: 1; height: 5px; background: #1a2235; border-radius: 3px; overflow: hidden; }
      .meter .mf { display: block; height: 100%; }
      .intent { font-size: 9.5px; color: #9fd0ff; margin-top: 4px; line-height: 1.25; }
      .status { font-size: 9.5px; color: #ffb27a; margin-top: 3px; }

      /* Inspect panel — whatever is selected or clicked (unit / believed enemy / terrain). */
      #inspect {
        position: fixed; right: 12px; bottom: 10px; width: 212px; user-select: none;
      }
      #inspect:empty { display: none; }
      #inspect .inspect-body {
        box-sizing: border-box; background: rgba(12, 16, 24, 0.92);
        border: 1px solid #283350; border-left: 4px solid var(--side, #8a8f9a);
        border-radius: 8px; padding: 8px 10px;
      }
      #inspect .terrain { font-size: 9.5px; color: #9bb39b; margin-top: 5px; line-height: 1.3; }
      #inspect .foot { font-size: 8.5px; color: #7e8eae; margin-top: 5px; font-style: italic; }
      #inspect .live { color: #7fd0ff; font-weight: 700; }
      #inspect .stale { color: #c9a55a; }

      /* Commander needs — what the autonomous main effort is asking of you. */
      #needs {
        position: fixed; top: 38px; left: 12px; width: 280px; user-select: none;
        background: rgba(10, 13, 20, 0.78); border: 1px solid #232d45; border-radius: 8px;
        padding: 7px 10px; font-size: 10px; line-height: 1.45;
      }
      #needs:empty { display: none; }
      #needs .needs-head { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; color: #5f6f92; margin-bottom: 4px; }
      #needs .needs-line { color: #9fb4d8; margin-top: 2px; }
      #needs .needs-warn { color: #ffb27a; font-weight: 600; }

      /* Combat log — fog-honest scrolling record (left side). */
      #log {
        position: fixed; left: 12px; bottom: 10px; width: 250px; max-height: 30vh;
        overflow-y: auto; user-select: none; font-size: 9.5px; line-height: 1.45;
        background: rgba(10, 13, 20, 0.78); border: 1px solid #232d45; border-radius: 8px;
        padding: 6px 9px; color: #aab8d4; scrollbar-width: thin;
      }
      #log:empty { display: none; }
      #log .log-turn { color: #eaf0ff; font-weight: 700; margin-top: 4px; }
      #log .log-phase { color: #5f6f92; }
      #log .log-us { color: #8ab8ff; font-weight: 600; }
      #log .log-them { color: #ff9a8a; font-weight: 600; }
      #log .log-miss { color: #8ea0c4; }
      #log .log-pen { color: #ffb27a; }
      #log .log-kill { color: #ff5a4a; font-weight: 800; }

      /* Match-end overlay. */
      #end { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        pointer-events: none; }
      #end:empty { display: none; }
      .end-box {
        pointer-events: auto; text-align: center; min-width: 320px;
        background: rgba(10, 13, 20, 0.94); border-radius: 14px; padding: 26px 34px;
        border: 1px solid #2a3550; box-shadow: 0 12px 60px rgba(0,0,0,0.6);
      }
      .end-win { border-color: #4a90ff; }
      .end-loss { border-color: #ff5a4a; }
      .end-title { font-size: 24px; font-weight: 800; letter-spacing: 1.5px; color: #eaf0ff; }
      .end-win .end-title { color: #9fd0ff; }
      .end-loss .end-title { color: #ff9a8a; }
      .end-stats { font-size: 12px; color: #8ea0c4; margin-top: 10px; }
      .end-row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
      .end-row .btn {
        font: inherit; font-size: 12px; font-weight: 700; color: #06203a;
        background: #7fb0ff; border: none; border-radius: 7px; padding: 8px 14px; cursor: pointer;
      }
      .end-row .btn-alt { background: #e6c84a; }

      /* Shell screens: menu / Interlude / AAR / operation end (M1). */
      .screen {
        position: fixed; inset: 0; overflow-y: auto; display: flex; flex-direction: column;
        align-items: center; gap: 14px; padding: 7vh 16px 6vh;
        background: radial-gradient(ellipse at 50% 28%, #131a28 0%, #0a0c10 70%);
      }
      .screen-wide { padding-top: 4vh; gap: 10px; }
      .screen .title { font-size: 52px; font-weight: 900; letter-spacing: 13px; color: #eaf0ff; text-shadow: 0 0 34px rgba(74,144,255,0.35); }
      .screen .title-win { color: #9fd0ff; } .screen .title-loss { color: #ff9a8a; font-size: 34px; letter-spacing: 6px; }
      .screen .title-sm { font-size: 13px; font-weight: 800; letter-spacing: 4px; color: #5f6f92; }
      .screen .tagline { font-size: 13px; color: #8ea0c4; text-align: center; line-height: 1.7; }
      .screen .subtitle { font-size: 17px; font-weight: 700; color: #eaf0ff; }
      .screen .briefing { font-size: 12px; color: #9fb4d8; max-width: 620px; text-align: center; line-height: 1.6; }
      .menu-box { display: flex; flex-direction: column; gap: 9px; min-width: 330px; margin-top: 10px; }
      .menu-btn { font: inherit; font-size: 14px; font-weight: 700; color: #06203a; background: #7fb0ff;
        border: none; border-radius: 9px; padding: 13px 18px; cursor: pointer; }
      .menu-btn:hover { background: #a9caff; }
      .menu-alt { background: #2a3550; color: #bcd0f0; } .menu-alt:hover { background: #3a4a6a; }
      .menu-foot { font-size: 11px; color: #5f6f92; max-width: 560px; text-align: center; line-height: 1.6; margin-top: 14px; }
      .verdict { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 7px; }
      .verdict-win { color: #9fd0ff; background: rgba(74,144,255,0.12); }
      .verdict-loss { color: #ff9a8a; background: rgba(255,90,74,0.12); }
      .stockpile { font-size: 12px; color: #bcd0f0; background: rgba(12,16,24,0.9); border: 1px solid #2a3550;
        border-radius: 9px; padding: 9px 16px; text-align: center; }
      .stockpile .hint, .roster-card .hint, .interlude-row .hint { font-size: 9.5px; color: #7e8eae; margin-top: 4px; }
      .roster { display: grid; grid-template-columns: repeat(auto-fit, minmax(225px, 1fr)); gap: 8px; width: min(96vw, 1000px); }
      .roster-card { background: rgba(12,16,24,0.9); border: 1px solid #283350; border-radius: 8px; padding: 8px 10px; }
      .roster-mech { border-left: 4px solid #4a90ff; }
      .roster-dead { opacity: 0.55; border-style: dashed; }
      .roster-line { font-size: 11px; color: #c9d6ee; line-height: 1.55; }
      .roster-line .sub { font-size: 9px; color: #8ea0c4; } .roster-line .warn { color: #ffb27a; }
      .roster-actions { display: flex; gap: 5px; margin-top: 6px; }
      .btn.tiny { font: inherit; font-size: 9.5px; font-weight: 700; color: #06203a; background: #7fb0ff;
        border: none; border-radius: 5px; padding: 4px 8px; cursor: pointer; }
      .btn.tiny.btn-alt { background: #e6c84a; }
      .btn.tiny.ghost { background: transparent; color: #5f6f92; border: 1px solid #2a3550; }
      .interlude-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
      .interlude-row .btn:not(.tiny) { font: inherit; font-size: 12px; font-weight: 700; color: #06203a;
        background: #e6c84a; border: none; border-radius: 7px; padding: 8px 13px; cursor: pointer; }
      .btn.begin { font: inherit; font-size: 15px; font-weight: 800; color: #06203a; background: #7fb0ff;
        border: none; border-radius: 9px; padding: 13px 26px; cursor: pointer; margin-top: 8px; }
      .btn.begin:hover { background: #a9caff; }
      .aar { max-width: 560px; }
      .aar-lines { margin-top: 14px; text-align: left; }
      .aar-head { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #5f6f92; margin-bottom: 6px; }
      .aar-line { font-size: 12px; color: #bcd0f0; line-height: 1.7; }
      .aar-voice { font-size: 12.5px; color: #9fd0ff; font-style: italic; margin-top: 12px; line-height: 1.6; }
      .aar-lost { font-size: 11px; color: #ff9a8a; font-weight: 700; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">VANTAGE</div>
    <div id="bar"></div>
    <div id="cards"></div>
    <div id="inspect"></div>
    <div id="log"></div>
    <div id="needs"></div>
    <div id="end"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
