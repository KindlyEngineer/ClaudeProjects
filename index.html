<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VANTAGE</title>
    <style>
      :root {
        --bg: #0a0b0d;
        --panel: rgba(12, 14, 17, 0.93);
        --line: #2b2f36;
        --line-soft: #1c2025;
        --ink: #c3c9ce;
        --ink-dim: #7f868d;
        --ink-faint: #555c63;
        --amber: #d8a03c;
        --amber-hi: #f0bc5c;
        --friend: #5d9ec9;
        --hostile: #c4554a;
        --ok: #7da06a;
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ink); }
      #app { width: 100vw; height: 100vh; display: block; }
      button { text-transform: uppercase; letter-spacing: 0.8px; }
      #hud {
        position: fixed; top: 8px; left: 12px;
        font-size: 11px; line-height: 1.5; letter-spacing: 1px; text-transform: uppercase;
        color: var(--ink-dim); pointer-events: none; user-select: none;
      }

      /* Control bar — phase/turn + verbs (bottom-centre, above the cards). */
      #bar {
        position: fixed; left: 50%; bottom: 178px; transform: translateX(-50%);
        display: flex; align-items: center; gap: 12px;
        background: var(--panel); border: 1px solid var(--line); border-top: 2px solid var(--amber-dim, #8a6a2f);
        border-radius: 2px; padding: 7px 14px; user-select: none;
      }
      #bar:empty { display: none; }
      #bar .bar-info { font-size: 12px; font-weight: 700; color: var(--ink); letter-spacing: 1.2px; text-transform: uppercase; }
      #bar .bar-hint { font-size: 10px; color: var(--ink-dim); max-width: 380px; }
      #bar .bar-warn { color: var(--amber); font-weight: 700; }
      .btn {
        font: inherit; font-size: 10.5px; font-weight: 700; color: var(--ink);
        background: #14171b; border: 1px solid var(--line); border-radius: 2px;
        padding: 6px 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px;
      }
      .btn:hover { border-color: var(--amber); color: var(--amber-hi); }
      #bar .btn { color: var(--amber); border-color: var(--amber-dim, #8a6a2f); }
      #bar .btn:hover { background: #1b1e23; color: var(--amber-hi); }
      #bar .btn-alt { color: var(--ink); border-color: var(--line); }
      #bar .btn-alt:hover { border-color: var(--friend); color: #9cc6e4; }

      /* Unit cards — bottom-centre. */
      #cards {
        position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
        display: flex; gap: 6px; max-width: 96vw; overflow-x: auto; padding: 4px;
        user-select: none;
      }
      .card {
        width: 142px; flex: 0 0 auto; box-sizing: border-box;
        background: var(--panel); border: 1px solid var(--line); border-left: 2px solid var(--side, var(--friend));
        border-radius: 2px; padding: 6px 8px; cursor: pointer; transition: opacity 0.1s, border-color 0.1s;
      }
      .card:hover { border-color: var(--ink-dim); border-left-color: var(--side, var(--friend)); }
      .card.greyed { opacity: 0.38; }
      .card.selected { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
      .card-h { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
      .card-h .abbr {
        font-weight: 800; font-size: 10px; color: #0a0b0d; background: var(--side, var(--friend));
        border-radius: 1px; width: 15px; height: 15px; line-height: 15px; text-align: center; flex: 0 0 auto;
      }
      .card-h .nm { font-size: 10.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden;
        text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.4px; }
      .card-h .nm .sub { font-size: 8px; font-weight: 400; color: var(--ink-faint); letter-spacing: 0; }
      .card-h .tag { margin-left: auto; font-size: 8.5px; font-weight: 700; color: var(--ink-faint); letter-spacing: 1px; }
      .card.selected .tag, .card .tag { color: var(--ink-dim); }
      .meter { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
      .meter .ml { font-size: 7.5px; color: var(--ink-faint); width: 28px; flex: 0 0 auto; letter-spacing: 1px; }
      .meter .mt { flex: 1; height: 3px; background: var(--line-soft); overflow: hidden; }
      .meter .mf { display: block; height: 100%; }
      .intent { font-size: 9px; color: #9cc6e4; margin-top: 5px; line-height: 1.35; }
      .status { font-size: 9px; color: var(--amber); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }

      /* Commander needs — the main effort's requests. */
      #needs {
        position: fixed; top: 36px; left: 12px; width: 285px; user-select: none;
        background: var(--panel); border: 1px solid var(--line); border-left: 2px solid var(--amber-dim, #8a6a2f);
        border-radius: 2px; padding: 7px 10px; font-size: 9.5px; line-height: 1.5;
      }
      #needs:empty { display: none; }
      #needs .needs-head { font-size: 8.5px; font-weight: 800; letter-spacing: 2.5px; color: var(--ink-faint); margin-bottom: 4px; }
      #needs .needs-line { color: var(--ink-dim); margin-top: 2px; }
      #needs .needs-warn { color: var(--amber); font-weight: 600; }

      /* The COMMS column — every voice, OUTSIDE the play area. In battle the
         board flexes left and this column owns the right edge: the live
         commander requests on top, the scrolling Speaker — Content transcript
         below. Nothing here ever covers a hex. */
      body.with-comms { display: flex; }
      body.with-comms #app { flex: 1 1 auto; min-width: 0; width: auto; height: 100vh; }
      #comms {
        flex: 0 0 300px; width: 300px; height: 100vh; box-sizing: border-box;
        display: flex; flex-direction: column; user-select: none;
        background: var(--panel); border-left: 1px solid var(--line);
      }
      #comms .comms-head {
        flex: 0 0 auto; padding: 8px 10px 6px; font-size: 8.5px; font-weight: 800;
        letter-spacing: 2.5px; color: var(--ink-faint);
        border-bottom: 1px solid var(--line-soft, #1c2025);
      }
      body.with-comms #needs {
        position: static; width: auto; flex: 0 0 auto; max-height: 30vh; overflow-y: auto;
        border: none; border-left: 2px solid var(--amber-dim, #8a6a2f);
        border-bottom: 1px solid var(--line); border-radius: 0; scrollbar-width: thin;
      }
      #commsfeed {
        flex: 1 1 auto; overflow-y: auto; padding: 7px 10px; font-size: 9.5px;
        line-height: 1.55; color: var(--ink-dim); scrollbar-width: thin;
      }
      #commsfeed .comms-line { margin-top: 5px; }
      #commsfeed .comms-line .who { color: var(--friend); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
      #commsfeed .comms-warn { color: var(--amber); }
      #commsfeed .comms-warn .who { color: var(--amber); }
      #commsfeed .comms-turn {
        margin-top: 8px; font-size: 8px; font-weight: 800; letter-spacing: 2px;
        color: var(--ink-faint); text-transform: uppercase;
      }
      /* Right-anchored overlays slide inboard of the column. */
      body.with-comms #inspect { right: 312px; }

      /* Combat log — fog-honest record (left). */
      #log {
        position: fixed; left: 12px; bottom: 10px; width: 255px; max-height: 30vh;
        overflow-y: auto; user-select: none; font-size: 9px; line-height: 1.5;
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 2px; padding: 6px 9px; color: var(--ink-dim); scrollbar-width: thin;
      }
      #log:empty { display: none; }
      #log .log-turn { color: var(--ink); font-weight: 700; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
      #log .log-phase { color: var(--ink-faint); letter-spacing: 1px; }
      #log .log-us { color: var(--friend); font-weight: 600; }
      #log .log-them { color: var(--hostile); font-weight: 600; }
      #log .log-miss { color: var(--ink-faint); }
      #log .log-pen { color: var(--amber); }
      #log .log-kill { color: var(--hostile); font-weight: 800; }

      /* Inspect panel (bottom-right). */
      #inspect { position: fixed; right: 12px; bottom: 10px; width: 215px; user-select: none; }
      #inspect:empty { display: none; }
      #inspect .inspect-body {
        box-sizing: border-box; background: var(--panel);
        border: 1px solid var(--line); border-left: 2px solid var(--side, var(--ink-faint));
        border-radius: 2px; padding: 8px 10px;
      }
      #inspect .comps { font-size: 8.5px; color: var(--ink-faint); margin-top: 5px; line-height: 1.5; }
      #inspect .comp-ok { color: var(--ink-dim); }
      #inspect .comp-lost { color: var(--amber); text-decoration: line-through; }
      #inspect .terrain { font-size: 9px; color: var(--ink-dim); margin-top: 5px; line-height: 1.4; }
      #inspect .foot { font-size: 8px; color: var(--ink-faint); margin-top: 5px; font-style: italic; }
      #inspect .live { color: var(--friend); font-weight: 700; }
      #inspect .stale { color: var(--amber); }

      /* Match-end overlay + AAR. */
      #end { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
      #end:empty { display: none; }
      .end-box {
        pointer-events: auto; text-align: center; min-width: 340px; position: relative;
        background: var(--panel); border: 1px solid var(--line); border-radius: 2px; padding: 26px 34px;
        box-shadow: 0 12px 60px rgba(0, 0, 0, 0.7);
      }
      .end-box::before, .end-box::after {
        content: ""; position: absolute; width: 14px; height: 14px; border: 2px solid var(--amber-dim, #8a6a2f);
      }
      .end-box::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
      .end-box::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
      .end-win { border-top: 2px solid var(--friend); }
      .end-loss { border-top: 2px solid var(--hostile); }
      .end-title { font-size: 21px; font-weight: 800; letter-spacing: 4px; color: var(--ink); text-transform: uppercase; }
      .end-win .end-title { color: var(--friend); }
      .end-loss .end-title { color: var(--hostile); }
      .end-stats { font-size: 11px; color: var(--ink-dim); margin-top: 10px; letter-spacing: 0.5px; }
      .end-row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
      .end-row .btn { color: var(--amber); border-color: var(--amber-dim, #8a6a2f); padding: 8px 16px; }
      .end-row .btn-alt { color: var(--ink); border-color: var(--line); }

      /* Shell screens: menu / Interlude / AAR / operation end. */
      .screen {
        position: fixed; inset: 0; overflow-y: auto; display: flex; flex-direction: column;
        align-items: center; gap: 14px; padding: 7vh 16px 6vh;
        background:
          linear-gradient(rgba(216, 160, 60, 0.025), transparent 30%),
          radial-gradient(ellipse at 50% 24%, #101318 0%, var(--bg) 70%);
      }
      .screen-wide { padding-top: 4vh; gap: 10px; }
      .screen .title { font-size: 46px; font-weight: 900; letter-spacing: 22px; color: var(--ink);
        text-indent: 22px; border-bottom: 2px solid var(--amber-dim, #8a6a2f); padding-bottom: 14px; }
      .screen .title-win { color: var(--friend); } .screen .title-loss { color: var(--hostile); font-size: 30px; letter-spacing: 8px; text-indent: 8px; }
      .screen .title-sm { font-size: 11px; font-weight: 800; letter-spacing: 5px; color: var(--ink-faint); }
      .screen .tagline { font-size: 11px; color: var(--ink-dim); text-align: center; line-height: 1.8;
        letter-spacing: 1.5px; text-transform: uppercase; }
      .screen .subtitle { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: 2px; text-transform: uppercase; }
      .screen .briefing { font-size: 11.5px; color: var(--ink-dim); max-width: 620px; text-align: center; line-height: 1.7; }
      .menu-box { display: flex; flex-direction: column; gap: 8px; min-width: 340px; margin-top: 10px; }
      .menu-btn {
        font: inherit; font-size: 12px; font-weight: 700; color: var(--amber);
        background: #14171b; border: 1px solid var(--amber-dim, #8a6a2f); border-radius: 2px;
        padding: 13px 18px; cursor: pointer; letter-spacing: 1.5px;
      }
      .menu-btn:hover { background: #1b1e23; color: var(--amber-hi); border-color: var(--amber); }
      .menu-alt { color: var(--ink-dim); border-color: var(--line); }
      .menu-alt:hover { color: var(--ink); border-color: var(--ink-dim); }
      .menu-foot { font-size: 10.5px; color: var(--ink-faint); max-width: 560px; text-align: center; line-height: 1.7; margin-top: 14px; }
      .verdict { font-size: 11px; font-weight: 700; padding: 6px 16px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid; }
      .verdict-win { color: var(--friend); border-color: var(--friend); background: rgba(93, 158, 201, 0.07); }
      .verdict-loss { color: var(--hostile); border-color: var(--hostile); background: rgba(196, 85, 74, 0.07); }
      .trust-notes { font-size: 10px; color: var(--ink-faint); background: var(--panel); border: 1px solid var(--line);
        border-radius: 2px; padding: 7px 14px; line-height: 1.8; max-width: min(96vw, 760px); text-align: left; }
      .stockpile { font-size: 11.5px; color: var(--ink); background: var(--panel); border: 1px solid var(--line);
        border-top: 2px solid var(--amber-dim, #8a6a2f); border-radius: 2px; padding: 9px 18px; text-align: center; letter-spacing: 0.5px; }
      .stockpile b { color: var(--amber-hi); }
      .stockpile .hint, .roster-card .hint, .interlude-row .hint { font-size: 9px; color: var(--ink-faint); margin-top: 4px; letter-spacing: 0; text-transform: none; }
      .roster { display: grid; grid-template-columns: repeat(auto-fit, minmax(228px, 1fr)); gap: 7px; width: min(96vw, 1000px); }
      .roster-card { background: var(--panel); border: 1px solid var(--line); border-radius: 2px; padding: 8px 10px; }
      .roster-mech { border-left: 2px solid var(--friend); }
      .roster-dead { opacity: 0.5; border-style: dashed; }
      .roster-line { font-size: 10.5px; color: var(--ink); line-height: 1.6; }
      .roster-line b { text-transform: uppercase; letter-spacing: 0.6px; }
      .roster-line .sub { font-size: 8.5px; color: var(--ink-faint); } .roster-line .warn { color: var(--amber); }
      .roster-actions { display: flex; gap: 5px; margin-top: 6px; }
      .btn.tiny { font-size: 8.5px; padding: 4px 8px; color: var(--ink-dim); }
      .btn.tiny:hover { color: var(--amber-hi); }
      .btn.tiny.btn-alt { color: var(--amber); border-color: var(--amber-dim, #8a6a2f); }
      .btn.tiny.ghost { background: transparent; color: var(--ink-faint); border-color: var(--line-soft); }
      .btn-off { opacity: 0.35; cursor: default; pointer-events: none; }
      .compose { max-width: 1000px; }
      .compose-head { width: 100%; text-align: center; letter-spacing: 2px; }
      .interlude-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
      .btn.begin {
        font-size: 13px; font-weight: 800; color: #0a0b0d; background: var(--amber);
        border: 1px solid var(--amber); padding: 13px 28px; margin-top: 8px; letter-spacing: 2px;
      }
      .btn.begin:hover { background: var(--amber-hi); color: #0a0b0d; }
      .aar { max-width: 560px; text-align: left; }
      .aar .end-title, .aar .end-stats { text-align: center; }
      .aar-lines { margin-top: 14px; }
      .aar-head { font-size: 9px; font-weight: 800; letter-spacing: 3px; color: var(--ink-faint); margin-bottom: 6px; }
      .aar-line { font-size: 11px; color: var(--ink); line-height: 1.75; }
      .aar-voice { font-size: 11.5px; color: #9cc6e4; font-style: italic; margin-top: 12px; line-height: 1.65;
        border-left: 2px solid var(--friend); padding-left: 10px; }
      .help-wrap { position: fixed; inset: 0; background: rgba(5,6,8,0.7); display: flex;
        align-items: center; justify-content: center; z-index: 50; }
      .help-box { max-width: 600px; max-height: 84vh; overflow-y: auto; background: var(--panel);
        border: 1px solid var(--line); border-top: 2px solid #8a6a2f; border-radius: 2px; padding: 20px 26px; }
      .help-line { font-size: 11px; color: var(--ink-dim); line-height: 1.7; margin-bottom: 9px; }
      .help-line b { color: var(--ink); }
      .menu-foot .ver { color: #3a4047; font-size: 9px; letter-spacing: 2px; }
      .aar-lost { font-size: 10.5px; color: var(--hostile); font-weight: 700; margin-top: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">VANTAGE</div>
    <div id="bar"></div>
    <div id="cards"></div>
    <div id="inspect"></div>
    <div id="log"></div>
    <div id="needs"></div>
    <div id="end"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
